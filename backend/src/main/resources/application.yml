spring:
  application:
    name: product-management-system
  
  datasource:
    url: jdbc:h2:mem:productdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8082

logging:
  level:
    com.mimitech.product: INFO
    org.springframework.web: INFO

product:
  app:
    name: "产品管理系统"
    version: "1.0.0"
    description: "Spring Boot + Vue.js全栈产品管理系统"
